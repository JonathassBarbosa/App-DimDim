<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>dimdim</title>
<meta name="theme-color" content="#00B67A">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<style>
:root{
  --g:#00B67A; --gd:#067A4F; --mint:#EAF7EE; --mint2:#D5F0DE;
  --paper:#FBFDFB; --ink:#10241A; --soft:#7C8C82;
  --red:#D6483B; --redl:#FDECEA;
  --font-display:'Sora',sans-serif; --font-body:'Inter',sans-serif;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:var(--font-body);-webkit-tap-highlight-color:transparent;}
body{min-height:100vh;position:relative;overflow-x:hidden;}
h1,h2,h3{font-family:var(--font-display);font-weight:700;margin:0;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}

.watermark{position:fixed;inset:0;z-index:0;opacity:.05;pointer-events:none;}

.splash{position:fixed;inset:0;z-index:999;background:var(--paper);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s ease;}
.splash.fade{opacity:0;pointer-events:none;}
.splash-mark{animation:floaty 1.8s ease-in-out infinite alternate;}
.splash-shadow{width:78px;height:16px;border-radius:50%;background:rgba(6,122,79,.18);margin:0 auto;animation:shrink 1.8s ease-in-out infinite alternate;filter:blur(2px);}
@keyframes floaty{from{transform:translateY(0)}to{transform:translateY(-12px)}}
@keyframes shrink{from{transform:scale(1)}to{transform:scale(.7)}}
.splash-name{font-family:var(--font-display);font-weight:700;font-size:24px;color:var(--ink);letter-spacing:-.3px;}

.app{position:relative;z-index:1;max-width:520px;margin:0 auto;padding-bottom:24px;}
.scr{display:none;padding:20px;}
.scr.active{display:block;animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

.back{display:flex;align-items:center;gap:6px;color:var(--soft);font-size:14px;font-weight:600;background:none;border:none;padding:4px 0 18px;}
.brand-row{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.brand-row h2{font-size:22px;letter-spacing:-.3px;}
.tagline{font-size:13px;color:var(--soft);margin:0 0 20px;}

.home-tile{display:flex;align-items:center;gap:14px;background:#fff;border-radius:20px;padding:16px 18px;margin-bottom:12px;border:none;width:100%;text-align:left;}
.home-ic{width:52px;height:52px;border-radius:16px;background:var(--mint);color:var(--gd);display:flex;align-items:center;justify-content:center;font-size:24px;flex-shrink:0;}
.home-tt{font-size:15.5px;font-weight:700;color:var(--ink);}
.home-sub{font-size:12.5px;color:var(--soft);margin-top:2px;}
.home-arrow{margin-left:auto;color:var(--soft);font-size:18px;}

label{font-size:12.5px;font-weight:600;color:var(--soft);display:block;margin:16px 0 8px;}
textarea,.field{width:100%;border-radius:16px;border:none;padding:13px 15px;font-size:14px;background:var(--mint);}
textarea{min-height:56px;resize:vertical;}
.row{display:flex;align-items:center;gap:10px;padding:12px 4px;}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--mint2);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:13px;color:#fff;background:#fff;}
.row.on .chk{background:var(--g);border-color:var(--g);}
.r-name{font-size:14.5px;font-weight:600;flex:1;min-width:0;}
.r-name.off{color:var(--red);}
.r-meta{font-size:11.5px;color:var(--soft);font-weight:400;}
.r-price{font-size:13.5px;font-weight:600;color:var(--soft);font-variant-numeric:tabular-nums;}

.btn{display:block;width:100%;text-align:center;background:var(--g);color:#fff;border:none;border-radius:999px;padding:15px;font-weight:700;font-size:15px;font-family:var(--font-display);}
.btn:disabled{background:var(--mint2);color:var(--soft);}
.btn.gh{background:var(--mint);color:var(--gd);}
.btn.mut{background:none;color:var(--soft);border:1.5px dashed var(--mint2);}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

.date-card{background:#fff;border-radius:18px;margin-bottom:12px;overflow:hidden;}
.date-head{display:flex;align-items:center;justify-content:space-between;padding:15px 18px;cursor:pointer;}
.date-title{font-size:14.5px;font-weight:700;}
.date-sub{font-size:11.5px;color:var(--soft);margin-top:2px;}
.date-tot{font-size:14px;font-weight:700;color:var(--gd);font-variant-numeric:tabular-nums;}
.date-body{padding:0 18px 18px;}

.pay-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:10px 0;}
.pay-opt{background:var(--mint);border-radius:14px;padding:11px 4px;text-align:center;font-size:12.5px;font-weight:600;color:var(--soft);}
.pay-opt.active{background:var(--g);color:#fff;}

.chip-row{display:flex;gap:8px;margin-bottom:18px;background:var(--mint);border-radius:999px;padding:4px;}
.chip{flex:1;text-align:center;padding:10px 4px;border-radius:999px;font-size:13px;font-weight:600;color:var(--soft);background:none;border:none;}
.chip.active{background:var(--ink);color:#fff;}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px;}
.stat{background:var(--mint);border-radius:18px;padding:15px;}
.stat.wide{grid-column:1/3;background:var(--ink);}
.stat.wide .lb{color:rgba(255,255,255,.55);}
.stat.wide .vl{color:#fff;}
.stat .lb{font-size:11.5px;color:var(--soft);font-weight:600;}
.stat .vl{font-size:20px;font-weight:700;margin-top:4px;color:var(--gd);font-variant-numeric:tabular-nums;}

.seg{display:flex;height:12px;border-radius:999px;overflow:hidden;margin:12px 0;}
.seg-part{height:100%;}
.rule-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;}
.rule-dot{width:9px;height:9px;border-radius:50%;display:inline-block;margin-right:8px;}
.rule-lb{font-size:13.5px;font-weight:600;}
.rule-vals{font-size:12.5px;color:var(--soft);font-weight:500;font-variant-numeric:tabular-nums;}

.ocr-drop{background:var(--mint);border-radius:20px;padding:34px 18px;text-align:center;color:var(--gd);font-size:13.5px;font-weight:600;}
.ocr-drop input{display:none;}

.edit-row{display:flex;align-items:center;gap:8px;padding:10px 0;}
.edit-row input{border:none;background:var(--mint);border-radius:12px;padding:9px 11px;font-size:13px;}
.edit-row input.nm{flex:1;font-weight:600;}
.edit-row input.vl{width:88px;text-align:right;font-weight:600;}
.edit-row select{border:none;background:var(--mint);border-radius:12px;padding:9px 8px;font-size:12px;}

.seclabel{font-size:11.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--soft);font-weight:700;margin:20px 0 10px;}
.empty{text-align:center;color:var(--soft);font-size:13px;padding:20px 8px;}
.warn{background:var(--redl);color:var(--red);border-radius:14px;padding:11px 15px;font-size:13px;font-weight:600;margin-bottom:12px;}
.ok-msg{background:var(--mint);color:var(--gd);border-radius:14px;padding:11px 15px;font-size:13px;font-weight:600;margin-bottom:12px;}
.toast{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:999px;font-size:13.5px;font-weight:500;opacity:0;transition:opacity .3s;z-index:50;max-width:85%;text-align:center;}
.toast.show{opacity:1;}
.flash-overlay{position:fixed;inset:0;background:var(--red);opacity:0;pointer-events:none;z-index:998;}
.flash-overlay.on{animation:flashRed 1.4s ease-in-out 2;}
@keyframes flashRed{0%{opacity:0}20%{opacity:.5}40%{opacity:0}60%{opacity:.5}80%{opacity:0}100%{opacity:0}}
</style>
</head>
<body>

<svg class="watermark" aria-hidden="true">
<defs>
<pattern id="wmpat" width="72" height="72" patternUnits="userSpaceOnUse" patternTransform="rotate(18)">
<circle cx="36" cy="36" r="17" fill="none" stroke="#067A4F" stroke-width="2.5"></circle>
<text x="24" y="43" font-family="Sora" font-weight="700" font-size="17" fill="#067A4F">d</text>
<g transform="translate(48,0) scale(-1,1)"><text x="24" y="43" font-family="Sora" font-weight="700" font-size="17" fill="#067A4F">d</text></g>
</pattern>
</defs>
<rect width="100%" height="100%" fill="url(#wmpat)"></rect>
</svg>

<div class="splash" id="splash">
  <div class="splash-mark">
    <svg width="76" height="76" viewBox="0 0 34 34" aria-hidden="true"><circle cx="17" cy="17" r="17" fill="#00B67A"></circle><text x="8" y="23" font-family="Sora" font-weight="700" font-size="18" fill="#EAF7EE">d</text><g transform="translate(21,0) scale(-1,1)"><text x="8" y="23" font-family="Sora" font-weight="700" font-size="18" fill="#067A4F">d</text></g></svg>
  </div>
  <div class="splash-shadow"></div>
  <div class="splash-name">dimdim</div>
</div>

<div class="flash-overlay" id="flashOverlay"></div>
<div class="toast" id="toast"></div>

<div class="app">

<!-- HOME -->
<div class="scr active" id="s-home">
  <div class="brand-row">
    <svg width="36" height="36" viewBox="0 0 34 34" aria-hidden="true"><circle cx="17" cy="17" r="17" fill="#00B67A"></circle><text x="8" y="23" font-family="Sora" font-weight="700" font-size="18" fill="#EAF7EE">d</text><g transform="translate(21,0) scale(-1,1)"><text x="8" y="23" font-family="Sora" font-weight="700" font-size="18" fill="#067A4F">d</text></g></svg>
    <h2>dimdim</h2>
  </div>
  <p class="tagline">seu dinheiro, sem enrolação</p>
  <button class="home-tile" data-go="lista"><div class="home-ic"><i>📝</i></div><div><div class="home-tt">Minha lista</div><div class="home-sub">Itens salvos para comprar</div></div><span class="home-arrow">›</span></button>
  <button class="home-tile" data-go="ocr"><div class="home-ic"><i>📷</i></div><div><div class="home-tt">Nota fiscal</div><div class="home-sub">Fotografe e registre em segundos</div></div><span class="home-arrow">›</span></button>
  <button class="home-tile" data-go="hist"><div class="home-ic"><i>🕘</i></div><div><div class="home-tt">Histórico</div><div class="home-sub">Compras por dia</div></div><span class="home-arrow">›</span></button>
  <button class="home-tile" data-go="painel"><div class="home-ic"><i>📊</i></div><div><div class="home-tt">Painel</div><div class="home-sub">Saldo livre e regra 50-30-20</div></div><span class="home-arrow">›</span></button>
  <button class="home-tile" data-go="registro"><div class="home-ic"><i>⚙️</i></div><div><div class="home-tt">Registro</div><div class="home-sub">Categorias, custos e proventos</div></div><span class="home-arrow">›</span></button>
</div>

<!-- LISTA -->
<div class="scr" id="s-lista">
  <button class="back" data-back>← Início</button>
  <label style="margin-top:0">Adicionar itens</label>
  <textarea id="paste" placeholder="Arroz 5kg, Alimentação, 28.90"></textarea>
  <button class="btn gh" style="margin-top:10px" id="btnAdd">Adicionar</button>
  <div class="seclabel">Itens salvos</div>
  <div id="catalog"></div>
</div>

<!-- NOTA FISCAL / OCR -->
<div class="scr" id="s-ocr">
  <button class="back" data-back>← Início</button>
  <label class="ocr-drop" for="fileInput" style="display:block;cursor:pointer">
    <div style="font-size:26px">🧾</div>
    <div style="margin-top:8px" id="ocrDropLabel">Fotografe a nota ou escolha um arquivo</div>
    <input type="file" id="fileInput" accept="image/*" capture="environment">
  </label>
  <div id="ocrProgress"></div>
  <div id="ocrResult"></div>
</div>

<!-- HISTÓRICO -->
<div class="scr" id="s-hist">
  <button class="back" data-back>← Início</button>
  <div id="histList"></div>
</div>

<!-- PAINEL -->
<div class="scr" id="s-painel">
  <button class="back" data-back>← Início</button>
  <div class="chip-row" id="periodChips">
    <button class="chip" data-p="dia">Dia</button>
    <button class="chip active" data-p="mes">Mês</button>
    <button class="chip" data-p="ano">Ano</button>
  </div>
  <div id="painelAlert"></div>
  <div class="stat-grid">
    <div class="stat"><div class="lb">Receita</div><div class="vl" id="pIncome">R$ 0</div></div>
    <div class="stat"><div class="lb">Gasto total</div><div class="vl" id="pSpent">R$ 0</div></div>
    <div class="stat wide"><div class="lb">Saldo livre</div><div class="vl" id="pFree">R$ 0</div></div>
  </div>
  <div class="seclabel">Regra 50-30-20</div>
  <div class="seg" id="ruleSeg"></div>
  <div id="ruleRows"></div>
  <div style="height:220px;position:relative;margin-top:14px"><canvas id="chart"></canvas></div>
</div>

<!-- REGISTRO -->
<div class="scr" id="s-registro">
  <button class="back" data-back>← Início</button>

  <div class="seclabel" style="margin-top:0">Conexão com a planilha</div>
  <input type="text" class="field" id="scriptUrlInput" placeholder="https://script.google.com/macros/s/AKfycb.../exec">
  <div class="btn-row" style="margin-top:10px">
    <button class="btn gh" id="btnTestConn">Testar</button>
    <button class="btn" id="btnSaveConn">Salvar</button>
  </div>
  <div id="connStatus" style="margin-top:8px;font-size:13px"></div>

  <div class="seclabel">Categorias e orçamentos</div>
  <div id="editCats"></div>

  <div class="seclabel">Custos fixos</div>
  <div id="editCustos"></div>

  <div class="seclabel">Proventos</div>
  <div id="editProventos"></div>

  <button class="btn" style="margin-top:16px" id="btnSaveRegistro">Salvar tudo na planilha</button>
</div>

</div>

<script>
/* ===================== ESTADO ===================== */
const GRUPOS = ['Necessidade','Desejo','Investimento'];
const LS = { catalog:'dd_catalog', config:'dd_config' };
function loadJSON(k,f){ try{ return JSON.parse(localStorage.getItem(k)) ?? f; }catch(e){ return f; } }
function saveJSON(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

let catalog = loadJSON(LS.catalog, [
  {id:'1',name:'Arroz 5kg',category:'Alimentação',price:0,checked:false,timesUsed:0}
]);
let config = loadJSON(LS.config, {scriptUrl:''});
let lastLocation = null;
let selectedPayment = null;
let cats = [
  {n:'Alimentação',v:800,g:'Necessidade'},{n:'Transporte',v:200,g:'Necessidade'},
  {n:'Contas Fixas',v:1900,g:'Necessidade'},{n:'Assinaturas',v:100,g:'Desejo'},
  {n:'Lazer',v:150,g:'Desejo'},{n:'Vestuário',v:100,g:'Desejo'},
  {n:'Cartão de Crédito',v:500,g:'Desejo'},{n:'Outros',v:100,g:'Desejo'}
];
let custos = [{n:'Aluguel',v:1500},{n:'Energia',v:232},{n:'Internet',v:100}];
let proventos = [{n:'Salário',v:4585},{n:'Vale-alimentação',v:388}];

function uid(){ return 'i'+Math.random().toString(36).slice(2,10); }
function money(n){ return 'R$ '+(Number(n)||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2400); }

/* ===================== SPLASH ===================== */
setTimeout(()=>{ document.getElementById('splash').classList.add('fade'); }, 1600);
setTimeout(()=>{ document.getElementById('splash').style.display='none'; }, 2300);

/* ===================== NAVEGAÇÃO ===================== */
document.querySelectorAll('[data-go]').forEach(b=>b.addEventListener('click', ()=>go(b.dataset.go)));
document.querySelectorAll('[data-back]').forEach(b=>b.addEventListener('click', ()=>go('home')));
function go(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('active'));
  document.getElementById('s-'+id).classList.add('active');
  if(id==='hist') renderHist();
  if(id==='painel') loadPainel();
  if(id==='registro') renderRegistro();
}

/* ===================== LISTA ===================== */
function parsePasteBox(){
  const raw = document.getElementById('paste').value.trim();
  if(!raw){ toast('Cole ou digite algum item primeiro.'); return; }
  raw.split('\n').map(l=>l.trim()).filter(Boolean).forEach(line=>{
    const parts = line.split(',').map(p=>p.trim());
    const name = parts[0]; if(!name) return;
    const category = parts[1] || 'Outros';
    let price = parts[2] ? parseFloat(parts[2].replace(',','.')) : 0;
    if(isNaN(price)) price = 0;
    const existing = catalog.find(i=>i.name.toLowerCase()===name.toLowerCase());
    if(existing){ existing.checked = true; if(price) existing.price = price; }
    else { catalog.push({id:uid(), name, category, price, checked:true, timesUsed:0}); }
  });
  document.getElementById('paste').value = '';
  saveJSON(LS.catalog, catalog);
  renderCatalog();
  toast('Item adicionado.');
}
document.getElementById('btnAdd').addEventListener('click', parsePasteBox);

function renderCatalog(){
  const box = document.getElementById('catalog');
  box.innerHTML = '';
  if(catalog.length===0){ box.innerHTML = '<div class="empty">Sua lista está vazia. Adicione itens acima.</div>'; return; }
  catalog.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'row' + (item.checked ? ' on' : '');
    row.innerHTML = `
      <div class="chk">${item.checked?'✓':''}</div>
      <div class="r-name">${item.name}<div class="r-meta">${item.category}${item.timesUsed>0?' · comprado '+item.timesUsed+'x':''}</div></div>
      <div class="r-price">${money(item.price)}</div>
    `;
    row.addEventListener('click', ()=>{ item.checked = !item.checked; saveJSON(LS.catalog,catalog); renderCatalog(); });
    box.appendChild(row);
  });
}
renderCatalog();

/* ===================== NOTA FISCAL (OCR) ===================== */
document.getElementById('fileInput').addEventListener('change', async (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  const progress = document.getElementById('ocrProgress');
  const label = document.getElementById('ocrDropLabel');
  label.textContent = 'Lendo a nota...';
  progress.innerHTML = '<div class="empty">Isso pode levar alguns segundos.</div>';
  try{
    const { data: { text } } = await Tesseract.recognize(file, 'por');
    label.textContent = 'Fotografar ou enviar outra nota';
    progress.innerHTML = '';
    processarTextoNota(text);
  }catch(err){
    progress.innerHTML = '<div class="warn">Não consegui ler essa imagem. Tente uma foto mais nítida.</div>';
    label.textContent = 'Fotografe a nota ou escolha um arquivo';
  }
});

function processarTextoNota(text){
  const linhas = text.split('\n').map(l=>l.trim()).filter(Boolean);
  const itens = [];
  const regexPreco = /(\d{1,4}[.,]\d{2})\s*$/;
  linhas.forEach(linha=>{
    const m = linha.match(regexPreco);
    if(!m) return;
    const preco = parseFloat(m[1].replace(',','.'));
    let nome = linha.slice(0, m.index).trim();
    let qtd = 1;
    const qm = nome.match(/^(\d+)\s*[xX]?\s+/);
    if(qm){ qtd = parseInt(qm[1],10); nome = nome.slice(qm[0].length).trim(); }
    nome = nome.replace(/^\d+\s*/, '').trim();
    if(nome.length < 2) return;
    itens.push({name: nome, qty: qtd, price: preco});
  });
  renderOcrResult(itens);
}

function renderOcrResult(itens){
  const box = document.getElementById('ocrResult');
  if(itens.length===0){
    box.innerHTML = '<div class="warn">Não encontrei itens com valores nessa imagem. Você pode ajustar manualmente ou tentar outra foto.</div>';
    return;
  }
  const selecionados = catalog.filter(c=>c.checked);
  const naoVieram = selecionados.filter(c=>!itens.some(i=>i.name.toLowerCase().includes(c.name.toLowerCase())||c.name.toLowerCase().includes(i.name.toLowerCase())));

  let html = '<div class="seclabel">Itens reconhecidos — revise antes de confirmar</div>';
  itens.forEach((it,idx)=>{
    const estavaNaLista = selecionados.some(c=>c.name.toLowerCase().includes(it.name.toLowerCase())||it.name.toLowerCase().includes(c.name.toLowerCase()));
    it.inList = estavaNaLista;
    html += `<div class="row"><div class="r-name${estavaNaLista?'':' off'}">${it.qty}x ${it.name}${estavaNaLista?'':' · fora da lista'}</div><div class="r-price">${money(it.qty*it.price)}</div></div>`;
  });
  if(naoVieram.length>0){
    html += `<div class="warn">Da sua lista, não veio na nota: ${naoVieram.map(f=>f.name).join(', ')}</div>`;
  }
  html += '<div class="pay-grid" id="ocrPayGrid"><button class="pay-opt" data-p="Pix">Pix</button><button class="pay-opt" data-p="Débito">Débito</button><button class="pay-opt" data-p="Crédito">Crédito</button></div>';
  html += '<button class="btn" id="btnConfirmOcr" style="margin-top:10px">Confirmar e registrar</button>';
  box.innerHTML = html;

  let payOcr = null;
  box.querySelectorAll('#ocrPayGrid .pay-opt').forEach(o=>o.addEventListener('click', ()=>{
    box.querySelectorAll('#ocrPayGrid .pay-opt').forEach(x=>x.classList.remove('active'));
    o.classList.add('active'); payOcr = o.dataset.p;
  }));

  document.getElementById('btnConfirmOcr').addEventListener('click', async ()=>{
    if(!payOcr){ toast('Escolha a forma de pagamento.'); return; }
    await enviarCompra(itens, payOcr);
    catalog.forEach(c=>c.checked=false);
    saveJSON(LS.catalog, catalog);
    toast('Compra da nota fiscal registrada.');
    go('hist');
  });
}

/* ===================== ENVIO DE COMPRA (usado por Histórico e OCR) ===================== */
async function enviarCompra(items, paymentMethod){
  if(!config.scriptUrl){ toast('Configure a URL do Apps Script em Registro.'); go('registro'); return null; }
  const now = new Date();
  const payload = {
    action: 'compra',
    purchaseId: uid(),
    date: now.toISOString().slice(0,10),
    time: now.toTimeString().slice(0,8),
    location: lastLocation,
    paymentMethod,
    items: items.map(i=>({name:i.name, category:i.category||'Outros', qty:i.qty||1, price:i.price||0, inList: i.inList !== false}))
  };
  try{
    const resp = await fetch(config.scriptUrl, {method:'POST', body: JSON.stringify(payload)});
    const data = await resp.json();
    if(data.ok && data.alertas && data.alertas.length>0){
      triggerBudgetAlert(data.alertas);
    }
    return data;
  }catch(e){
    toast('Não consegui enviar para a planilha agora.');
    return null;
  }
}

function triggerBudgetAlert(alertas){
  const overlay = document.getElementById('flashOverlay');
  overlay.classList.add('on');
  setTimeout(()=>overlay.classList.remove('on'), 3000);
  playBeep();
  toast('Orçamento estourado em: ' + alertas.map(a=>a.categoria).join(', '));
}
function playBeep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,0.35,0.7].forEach(t=>{
      const o = ctx.createOscillator(); const g = ctx.createGain();
      o.type='square'; o.frequency.value=880;
      o.connect(g); g.connect(ctx.destination);
      g.gain.setValueAtTime(0.0001, ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(0.25, ctx.currentTime+t+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime+t+0.25);
      o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.3);
    });
  }catch(e){}
}

/* ===================== HISTÓRICO ===================== */
let history = [{date:'Hoje', items:[], open:true, done:false}];
let payHoje = null;

function renderHist(){
  const box = document.getElementById('histList');
  box.innerHTML = '';
  history.forEach((h, idx)=>{
    const isToday = idx===0;
    const selected = isToday ? catalog.filter(c=>c.checked) : h.items;
    const total = isToday ? selected.reduce((s,i)=>s+(i.price||0),0) : h.items.reduce((s,i)=>s+i.qty*i.price,0);
    const card = document.createElement('div');
    card.className = 'date-card';
    card.innerHTML = `
      <div class="date-head" data-idx="${idx}">
        <div><div class="date-title">${h.date}${isToday?' · em aberto':''}</div><div class="date-sub">${isToday?selected.length:h.items.length} itens</div></div>
        <div style="display:flex;align-items:center;gap:8px"><span class="date-tot">${money(total)}</span><span>${h.open?'▲':'▼'}</span></div>
      </div>`;
    if(h.open){
      const body = document.createElement('div');
      body.className = 'date-body';
      if(isToday){
        if(selected.length===0){
          body.innerHTML = '<div class="empty">Nenhum item selecionado ainda hoje. Marque itens na sua Lista.</div>';
        } else {
          body.innerHTML = selected.map(i=>`<div class="row"><div class="r-name">${i.name}</div><div class="r-price">${money(i.price)}</div></div>`).join('');
          body.innerHTML += '<div class="pay-grid" id="payHojeGrid"><button class="pay-opt" data-p="Pix">Pix</button><button class="pay-opt" data-p="Débito">Débito</button><button class="pay-opt" data-p="Crédito">Crédito</button></div>';
          body.innerHTML += '<button class="btn gh" id="btnLoc" type="button">📍 Usar minha localização</button><div id="locStatus" style="margin-top:6px"></div>';
          body.innerHTML += '<button class="btn" id="btnFinishToday" style="margin-top:10px">Finalizar</button>';
        }
      } else {
        body.innerHTML = h.items.map(i=>`<div class="row"><div class="r-name${i.inList?'':' off'}">${i.qty}x ${i.name}${i.inList?'':' · fora da lista'}</div><div class="r-price">${money(i.qty*i.price)}</div></div>`).join('') + `<div class="r-meta" style="margin-top:8px">Pagamento: ${h.pay}</div>`;
      }
      card.appendChild(body);
    }
    card.querySelector('.date-head').addEventListener('click', ()=>{ h.open = !h.open; renderHist(); });
    box.appendChild(card);
  });

  const payGrid = document.getElementById('payHojeGrid');
  if(payGrid){
    payGrid.querySelectorAll('.pay-opt').forEach(o=>o.addEventListener('click', (e)=>{
      e.stopPropagation();
      payGrid.querySelectorAll('.pay-opt').forEach(x=>x.classList.remove('active'));
      o.classList.add('active'); payHoje = o.dataset.p;
    }));
  }
  const btnLoc = document.getElementById('btnLoc');
  if(btnLoc){
    btnLoc.addEventListener('click', (e)=>{
      e.stopPropagation();
      const status = document.getElementById('locStatus');
      status.textContent = 'Obtendo localização...';
      if(!navigator.geolocation){ status.textContent='Geolocalização não suportada'; return; }
      navigator.geolocation.getCurrentPosition(pos=>{
        lastLocation = {lat:pos.coords.latitude, lng:pos.coords.longitude};
        status.textContent = `📍 ${lastLocation.lat.toFixed(4)}, ${lastLocation.lng.toFixed(4)}`;
      }, ()=>{ status.textContent = 'Não foi possível obter localização'; }, {timeout:8000});
    });
  }
  const btnFin = document.getElementById('btnFinishToday');
  if(btnFin){
    btnFin.addEventListener('click', async (e)=>{
      e.stopPropagation();
      if(!payHoje){ toast('Escolha a forma de pagamento.'); return; }
      const sel = catalog.filter(c=>c.checked);
      if(sel.length===0){ toast('Selecione itens na Lista primeiro.'); return; }
      btnFin.textContent = 'Enviando...'; btnFin.disabled = true;
      const items = sel.map(i=>({name:i.name, category:i.category, qty:1, price:i.price, inList:true}));
      await enviarCompra(items, payHoje);
      sel.forEach(i=>{ i.timesUsed=(i.timesUsed||0)+1; i.checked=false; });
      saveJSON(LS.catalog, catalog);
      history.splice(1,0,{date:'Hoje', items, open:false, done:true, pay:payHoje});
      history[0] = {date:'Hoje', items:[], open:true, done:false};
      payHoje = null; lastLocation = null;
      toast('Compra registrada!');
      renderHist();
    });
  }
}

/* ===================== PAINEL ===================== */
document.querySelectorAll('#periodChips .chip').forEach(c=>c.addEventListener('click', ()=>{
  document.querySelectorAll('#periodChips .chip').forEach(x=>x.classList.remove('active'));
  c.classList.add('active');
  loadPainel(c.dataset.p);
}));

let chartInst = null;
async function loadPainel(periodo){
  periodo = periodo || 'mes';
  const alertBox = document.getElementById('painelAlert');
  if(!config.scriptUrl){
    alertBox.innerHTML = '<div class="warn">Configure a URL do Apps Script em Registro para ver dados reais. Mostrando um exemplo.</div>';
    renderPainel({receita:5000, gastoTotal:3120, saldoLivre:1880, grupos:[
      {grupo:'Necessidade', gasto:2540, meta:2500}, {grupo:'Desejo', gasto:280, meta:1500}, {grupo:'Investimento', gasto:300, meta:1000}
    ], alertas:[]});
    return;
  }
  alertBox.innerHTML = '';
  try{
    const resp = await fetch(`${config.scriptUrl}?action=painel&periodo=${periodo}`);
    const data = await resp.json();
    if(!data.ok){ alertBox.innerHTML = `<div class="warn">Erro: ${data.error}</div>`; return; }
    renderPainel(data);
  }catch(e){
    alertBox.innerHTML = '<div class="warn">Não foi possível carregar o painel agora.</div>';
  }
}

function renderPainel(data){
  document.getElementById('pIncome').textContent = money(data.receita);
  document.getElementById('pSpent').textContent = money(data.gastoTotal);
  document.getElementById('pFree').textContent = money(data.saldoLivre);

  const alertBox = document.getElementById('painelAlert');
  if(data.alertas && data.alertas.length>0){
    alertBox.innerHTML = `<div class="warn">Orçamento estourado: ${data.alertas.map(a=>a.categoria).join(', ')}</div>`;
  }

  const colors = {Necessidade:'#00B67A', Desejo:'#7FD9A8', Investimento:'#C8F0D8'};
  const seg = document.getElementById('ruleSeg');
  const total = data.grupos.reduce((s,g)=>s+g.gasto,0) || 1;
  seg.innerHTML = data.grupos.map(g=>`<div class="seg-part" style="width:${(g.gasto/total)*100}%;background:${colors[g.grupo]||'#ccc'}"></div>`).join('');

  const rows = document.getElementById('ruleRows');
  rows.innerHTML = data.grupos.map(g=>{
    const pctIdeal = data.receita>0 ? Math.round((g.meta/data.receita)*100) : 0;
    return `<div class="rule-row"><div><span class="rule-dot" style="background:${colors[g.grupo]||'#ccc'}"></span><span class="rule-lb">${g.grupo} (${pctIdeal}% ideal)</span></div><div class="rule-vals">${money(g.gasto)} / ${money(g.meta)}</div></div>`;
  }).join('');

  const ctx = document.getElementById('chart');
  if(chartInst) chartInst.destroy();
  chartInst = new Chart(ctx, {
    type:'bar',
    data:{ labels:data.grupos.map(g=>g.grupo), datasets:[
      {label:'Gasto', data:data.grupos.map(g=>Math.round(g.gasto)), backgroundColor:'#00B67A', borderRadius:6},
      {label:'Meta', data:data.grupos.map(g=>Math.round(g.meta)), backgroundColor:'#C8F0D8', borderRadius:6}
    ]},
    options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{position:'bottom'}}, scales:{y:{beginAtZero:true}} }
  });
}

function renderEditCats(){
  const box = document.getElementById('editCats');
  box.innerHTML = '';
  cats.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'edit-row';
    row.innerHTML = `<input class="nm" value="${item.n}"><select>${GRUPOS.map(g=>`<option ${g===item.g?'selected':''}>${g}</option>`).join('')}</select><input class="vl" value="${item.v}">`;
    row.querySelector('.nm').addEventListener('change', e=>item.n=e.target.value);
    row.querySelector('select').addEventListener('change', e=>item.g=e.target.value);
    row.querySelector('.vl').addEventListener('change', e=>item.v=parseFloat(e.target.value)||0);
    box.appendChild(row);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn mut'; addBtn.style.marginTop='6px'; addBtn.textContent = 'Adicionar categoria';
  addBtn.addEventListener('click', ()=>{ cats.push({n:'Nova categoria', v:0, g:'Necessidade'}); renderEditCats(); });
  box.appendChild(addBtn);
}
function renderEditSimple(target, list, placeholder){
  const box = document.getElementById(target);
  box.innerHTML = '';
  list.forEach(item=>{
    const row = document.createElement('div');
    row.className = 'edit-row';
    row.innerHTML = `<input class="nm" value="${item.n}"><input class="vl" value="${item.v}">`;
    row.querySelector('.nm').addEventListener('change', e=>item.n=e.target.value);
    row.querySelector('.vl').addEventListener('change', e=>item.v=parseFloat(e.target.value)||0);
    box.appendChild(row);
  });
  const addBtn = document.createElement('button');
  addBtn.className = 'btn mut'; addBtn.style.marginTop='6px'; addBtn.textContent = placeholder;
  addBtn.addEventListener('click', ()=>{ list.push({n:'Novo item', v:0}); renderEditSimple(target,list,placeholder); });
  box.appendChild(addBtn);
}
function renderRegistro(){
  renderEditCats();
  renderEditSimple('editCustos', custos, 'Adicionar custo fixo');
  renderEditSimple('editProventos', proventos, 'Adicionar provento');
}

document.getElementById('btnSaveRegistro').addEventListener('click', async ()=>{
  if(!config.scriptUrl){ toast('Configure a URL do Apps Script primeiro.'); return; }
  const btn = document.getElementById('btnSaveRegistro');
  btn.textContent = 'Salvando...'; btn.disabled = true;
  try{
    await fetch(config.scriptUrl, {method:'POST', body: JSON.stringify({action:'categorias', categorias: cats})});
    await fetch(config.scriptUrl, {method:'POST', body: JSON.stringify({action:'custosFixos', itens: custos})});
    await fetch(config.scriptUrl, {method:'POST', body: JSON.stringify({action:'proventos', itens: proventos})});
    toast('Registro salvo na planilha.');
  }catch(e){
    toast('Não consegui salvar agora. Tente novamente.');
  }
  btn.textContent = 'Salvar tudo na planilha'; btn.disabled = false;
});
